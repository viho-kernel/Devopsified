apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-web-app
  labels:
    app: go-web-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: go-web-app
  template:
    metadata:
      labels:
        app: go-web-app
    spec:
      containers:
        - name: go-web-app
          image: "{{ .Values.deployment.image }}:{{ .Values.deployment.tag }}"
          ports:
            - containerPort: { ? { .Values.deployment.port } }
